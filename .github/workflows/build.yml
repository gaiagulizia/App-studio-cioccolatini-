name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Ensure Web Assets Folder Exists
        run: |
          if [ ! -d "www" ]; then
            mkdir www
            echo "<html><body>App Studio</body></html>" > www/index.html
          fi

      - name: Add Android platform
        run: |
          rm -rf android
          npx cap add android
        env:
          CI: true

      - name: Copy native Java files
        run: |
          DEST="android/app/src/main/java/com/produttivita/app"
          mkdir -p "$DEST"
          cp android-src/TimerService.java "$DEST/"
          cp android-src/TimerPlugin.java  "$DEST/"
          cp android-src/MainActivity.java "$DEST/"

      - name: Patch AndroidManifest.xml
        run: python3 patch-manifest.py

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Produttivita-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
