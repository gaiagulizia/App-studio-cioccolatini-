name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Java
        uses: actions/setup-java@3a474e3efd14c47e6d222f0119b35222def9f857 # v4.0.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@39228d37a702b8f413a8ece673b0e28063c71330 # v4.1.0
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@7c172bab5da3160a73693444907a13bd519fa62a # v3.2.1

      - name: Install dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build --if-present

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
        env:
          CI: true

      - name: Copy native Java files
        run: |
          DEST="android/app/src/main/java/com/produttivita/app"
          mkdir -p "$DEST"
          cp android-src/TimerService.java "$DEST/"
          cp android-src/TimerPlugin.java  "$DEST/"
          cp android-src/MainActivity.java "$DEST/"

      - name: Patch AndroidManifest.xml
        run: python3 patch-manifest.py

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

      - name: Upload APK
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7834576b402471 # v4.5.0
        with:
          name: Produttivita-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
