name: Build APK

# Si avvia automaticamente ogni volta che carichi/modifichi un file,
# oppure manualmente dal tab "Actions" su GitHub.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 1. Scarica i file del repository
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java 17 (richiesto da Capacitor 6)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. Android SDK (build tools, platform tools)
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Installa Capacitor CLI e dipendenze
      - name: Install dependencies
        run: npm install

      # 6. Genera il progetto Android
      - name: Add Android platform
        run: npx cap add android
        env:
          CI: true

      # 7. Copia i file Java nativi (TimerService, TimerPlugin, MainActivity)
      - name: Copy native Java files
        run: |
          DEST="android/app/src/main/java/com/produttivita/app"
          mkdir -p "$DEST"
          cp android-src/TimerService.java "$DEST/"
          cp android-src/TimerPlugin.java  "$DEST/"
          cp android-src/MainActivity.java "$DEST/"
          echo "File Java copiati in $DEST"
          ls "$DEST"

      # 8. Aggiunge permessi e servizio all'AndroidManifest.xml
      - name: Patch AndroidManifest.xml
        run: python3 patch-manifest.py

      # 9. Sincronizza i file web (www/) nell'app Android
      - name: Sync Capacitor
        run: npx cap sync android

      # 10. Compila l'APK in modalità debug
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

      # 11. Rende l'APK scaricabile come artefatto (disponibile per 30 giorni)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Produttivita-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
